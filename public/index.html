<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />.
    <title>Coming Soon</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@700&family=Saira:wght@700&display=swap");

      body {
        margin: 0;
        height: 100vh;
        background-color: #e9de5c;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      /* Default h1 styles */
      h1 {
        font-size: 3.875rem;
        text-align: center;
        font-weight: 700;
        margin-bottom: 0;
        font-family: "Saira";
      }

      /* Default h2 styles */
      h2 {
        font-size: 2.875rem;
        font-weight: 700;
        margin: 0;
        font-family: "Manrope";
      }

      img {
        max-width: 60%;
      }

      /* Medium screens (up to 1440px) */
      @media (max-width: 1440px) {
        h1 {
          font-size: 3rem;
        }
        h2 {
          font-size: 2.5rem;
        }
      }

      /* Medium screens (up to 1280px) */
      @media (max-width: 1280px) {
        img {
          max-width: 70%;
        }
      }

      /* Small screens (up to 768px) */
      @media (max-width: 768px) {
        h1 {
          font-size: 2.5rem;
        }
        h2 {
          font-size: 2rem;
          margin-top: 10px;
        }
        img {
          max-width: 80%;
        }
      }

      /* Very small screens (up to 480px) */
      @media (max-width: 640px) {
        h1 {
          font-size: 2rem;
          line-height: 1.2;
        }
        h2 {
          font-size: 1.5rem;
        }
        img {
          max-width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <h1>We're making things awesome!</h1>
    <h2>Check back soon</h2>

    <img src="bannerImg.svg" />
  </body>
</html>
